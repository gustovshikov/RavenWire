# Sensor Stack — Live Demo Deployment
# Usage: CAPTURE_IFACE=ens16f1 docker compose -f deploy/compose/compose.dev.yml up -d
#
# Web UI: http://<host-ip>:4000
# Dashboard:    /
# Enrollment:   /enrollment
# PCAP Config:  /pcap-config
# Rules:        /rules

volumes:
  logs:
  pcap_shm:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=512m"
  cm_data:

services:

  # ── Config Manager (Phoenix LiveView Web UI) ──────────────────────────────
  config-manager:
    build:
      context: ../../config-manager
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
      - "9090:9090"
    environment:
      - MIX_ENV=dev
      - SENSOR_DB_PATH=/data/config_manager.db
      - SENSOR_CA_PATH=/data/ca
      - PHX_HOST=${HOST_IP:-0.0.0.0}
      - SECRET_KEY_BASE=demo_secret_key_base_64chars_long_for_dev_only_not_for_prod_use
      - AUTO_ENROLL_FIRST=true
    volumes:
      - cm_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Zeek ──────────────────────────────────────────────────────────────────
  zeek:
    image: zeek/zeek:latest
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    cap_drop:
      - ALL
    environment:
      - CAPTURE_IFACE=${CAPTURE_IFACE:-ens16f1}
    volumes:
      - ../../spike/zeek/local.zeek:/usr/local/zeek/share/zeek/site/local.zeek:ro
      - logs:/logs
    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p /logs/zeek
        exec zeek -i af_packet::${CAPTURE_IFACE:-ens16f1} -C \
          /usr/local/zeek/share/zeek/site/local.zeek
    restart: unless-stopped

  # ── Suricata ──────────────────────────────────────────────────────────────
  suricata:
    image: jasonish/suricata:latest
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    cap_drop:
      - ALL
    environment:
      - CAPTURE_IFACE=${CAPTURE_IFACE:-ens16f1}
    volumes:
      - ../../config/sensor/suricata.yaml:/etc/suricata/suricata.yaml:ro
      - logs:/logs
    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p /logs/suricata
        exec suricata -c /etc/suricata/suricata.yaml \
          --af-packet=${CAPTURE_IFACE:-ens16f1} -l /logs/suricata
    restart: unless-stopped

  # Vector ────────────────────────────────────────────────────────────────
  vector:
    image: timberio/vector:latest-alpine
    volumes:
      - ./vector-demo.toml:/etc/vector/vector.toml:ro
      - logs:/logs
    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p /logs/vector
        exec /usr/local/bin/vector --config /etc/vector/vector.toml
    depends_on:
      - zeek
      - suricata
    restart: unless-stopped

  # ── pcap_ring_writer ──────────────────────────────────────────────────────
  pcap-ring-writer:
    build:
      context: ../../spike/pcap_ring_writer
      dockerfile: Dockerfile
    network_mode: host
    cap_add:
      - NET_RAW
    cap_drop:
      - ALL
    environment:
      - CAPTURE_IFACE=${CAPTURE_IFACE:-ens16f1}
      - RING_SIZE_MB=${RING_SIZE_MB:-512}
      - RING_PATH=/dev/shm/sensor_pcap_ring
      - CONTROL_SOCK=/var/run/pcap_ring.sock
    volumes:
      - /dev/shm:/dev/shm
      - /var/run:/var/run
    restart: unless-stopped
