version: "3.9"

# Network Sensor Stack — Spike Compose File
#
# Usage:
#   CAPTURE_IFACE=eth0 docker-compose up
#
# All services share a "logs" volume for log handoff.
# pcap_ring_writer and pcap_manager share /var/run for the control socket.

volumes:
  logs:
  pcap_shm:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=512m"

services:

  # ── Zeek ──────────────────────────────────────────────────────────────────
  zeek:
    image: ghcr.io/zeek/zeek:latest
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    cap_drop:
      - ALL
    environment:
      - CAPTURE_IFACE=${CAPTURE_IFACE:-eth0}
    volumes:
      - ./zeek/local.zeek:/usr/local/zeek/share/zeek/site/local.zeek:ro
      - logs:/logs
    command: >
      zeek
        -i af_packet::${CAPTURE_IFACE:-eth0}
        -C
        /usr/local/zeek/share/zeek/site/local.zeek
    restart: unless-stopped

  # ── Suricata ──────────────────────────────────────────────────────────────
  suricata:
    image: jasonish/suricata:latest
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    cap_drop:
      - ALL
    environment:
      - CAPTURE_IFACE=${CAPTURE_IFACE:-eth0}
    volumes:
      - ./suricata/suricata.yaml:/etc/suricata/suricata.yaml:ro
      - logs:/logs
    command: >
      suricata
        -c /etc/suricata/suricata.yaml
        --af-packet=${CAPTURE_IFACE:-eth0}
        -l /logs/suricata
    restart: unless-stopped

  # ── Vector ────────────────────────────────────────────────────────────────
  vector:
    image: timberio/vector:latest-alpine
    volumes:
      - ./vector/vector.toml:/etc/vector/vector.toml:ro
      - logs:/logs
    command: ["--config", "/etc/vector/vector.toml"]
    depends_on:
      - zeek
      - suricata
    restart: unless-stopped

  # ── pcap_ring_writer ──────────────────────────────────────────────────────
  pcap_ring_writer:
    build:
      context: ./pcap_ring_writer
      dockerfile: Dockerfile
    network_mode: host
    cap_add:
      - NET_RAW
    cap_drop:
      - ALL
    environment:
      - CAPTURE_IFACE=${CAPTURE_IFACE:-eth0}
      - RING_SIZE_MB=${RING_SIZE_MB:-512}
      - RING_PATH=/dev/shm/sensor_pcap_ring
      - CONTROL_SOCK=/var/run/pcap_ring.sock
    volumes:
      - /dev/shm:/dev/shm
      - /var/run:/var/run
    restart: unless-stopped

  # ── pcap_manager ──────────────────────────────────────────────────────────
  pcap_manager:
    build:
      context: ./pcap_manager
      dockerfile: Dockerfile
    environment:
      - ALERT_DELAY_SECONDS=${ALERT_DELAY_SECONDS:-10}
      - PRE_ALERT_WINDOW_SECONDS=${PRE_ALERT_WINDOW_SECONDS:-5}
      - POST_ALERT_WINDOW_SECONDS=${POST_ALERT_WINDOW_SECONDS:-3}
      - CONTROL_SOCK=/var/run/pcap_ring.sock
    volumes:
      - /var/run:/var/run
      - /tmp:/tmp
    depends_on:
      - pcap_ring_writer
    restart: "no"
