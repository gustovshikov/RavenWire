# Vector production configuration for Sensor_Pod
# Sources: Zeek file source, Suricata EVE JSON file source
# Sinks: local console plus alert webhook
# Alert webhook: HTTP POST to Sensor_Agent PCAP Manager on qualifying Suricata alerts
# Disk-backed buffer: 1GB, FIFO drop on overflow

# ── Sources ──────────────────────────────────────────────────────────────────

[sources.zeek_logs]
type = "file"
include = ["/var/sensor/logs/zeek/*.log"]
read_from = "beginning"
ignore_older_secs = 86400

[sources.suricata_eve]
type = "file"
include = ["/var/sensor/logs/suricata/eve*.json"]
read_from = "beginning"
ignore_older_secs = 86400

# ── Transforms ───────────────────────────────────────────────────────────────

[transforms.parse_zeek]
type = "remap"
inputs = ["zeek_logs"]
source = '''
  . = parse_json!(string!(.message))
  .sensor_source = "zeek"
  .sensor_pod_id = get_env_var!("SENSOR_POD_NAME")
  # Preserve community_id exactly as-is
  if !exists(.community_id) {
    .community_id = null
  }
  if !exists(.ts) {
    .ts = now()
  }
'''

[transforms.parse_suricata]
type = "remap"
inputs = ["suricata_eve"]
source = '''
  . = parse_json!(string!(.message))
  .sensor_source = "suricata"
  .sensor_pod_id = get_env_var!("SENSOR_POD_NAME")
  # Preserve community_id exactly as-is
  if !exists(.community_id) {
    .community_id = null
  }
  if !exists(.timestamp) {
    .timestamp = now()
  }
'''

[transforms.normalize]
type = "remap"
inputs = ["parse_zeek", "parse_suricata"]
source = '''
  # Ensure community_id is always at the top level, unchanged
  if exists(.community_id) && .community_id != null {
    .community_id = string!(.community_id)
  }
  .vector_ingest_ts = now()
'''

# Route qualifying Suricata alerts to the PCAP Manager webhook
# IMPORTANT: The severity threshold value (<=2) MUST match SensorConfig.severity_threshold.
# Both PCAP_Manager and Vector use the same threshold sourced from the sensor config bundle.
# When the sensor config bundle is applied, the Vector config is regenerated from the template
# using SensorConfig.severity_threshold so this value stays in sync automatically.
[transforms.route_alerts]
type = "route"
inputs = ["parse_suricata"]

[transforms.route_alerts.route]
qualifying_alert = '.event_type == "alert" && exists(.alert.severity) && ((to_int(.alert.severity) ?? 999) <= 2)'

# ── Alert webhook sink (Sensor_Agent PCAP Manager) ────────────────────────────

[sinks.pcap_alert_webhook]
type = "http"
inputs = ["route_alerts.qualifying_alert"]
uri = "${SENSOR_AGENT_ALERT_URL}"
method = "post"
encoding.codec = "json"

[sinks.pcap_alert_webhook.buffer]
type = "memory"
max_events = 1000
when_full = "drop_newest"

# ── Local normalized event sink ───────────────────────────────────────────────

[sinks.normalized_console]
type = "console"
inputs = ["normalize"]
encoding.codec = "json"
