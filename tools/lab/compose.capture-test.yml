# RavenWire lab capture test
#
# Usage:
#   CAPTURE_IFACE=eth0 podman compose -p ravenwire-lab -f tools/lab/compose.capture-test.yml up
#
# All services share a "logs" volume for log handoff.
# pcap_ring_writer and pcap_carve_simulator share /var/run for the control socket.

volumes:
  logs:
  pcap_shm:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=512m"

services:

  # ── Zeek ──────────────────────────────────────────────────────────────────
  zeek:
    image: docker.io/zeek/zeek:latest
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    cap_drop:
      - ALL
    environment:
      - CAPTURE_IFACE=${CAPTURE_IFACE:-eth0}
    volumes:
      - ./config/zeek/local.zeek:/usr/local/zeek/share/zeek/site/local.zeek:ro
      - logs:/logs
    entrypoint: ["/bin/sh", "-c", "mkdir -p /logs/zeek && exec zeek -i af_packet::${CAPTURE_IFACE:-eth0} -C /usr/local/zeek/share/zeek/site/local.zeek"]
    restart: unless-stopped

  # ── Suricata ──────────────────────────────────────────────────────────────
  suricata:
    image: docker.io/jasonish/suricata:latest
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    cap_drop:
      - ALL
    environment:
      - CAPTURE_IFACE=${CAPTURE_IFACE:-eth0}
    volumes:
      - ./config/suricata/suricata.yaml:/etc/suricata/suricata.yaml:ro
      - logs:/logs
    entrypoint: ["/bin/sh", "-c", "mkdir -p /logs/suricata && exec suricata -c /etc/suricata/suricata.yaml --af-packet=${CAPTURE_IFACE:-eth0} -l /logs/suricata"]
    restart: unless-stopped

  # ── Vector ────────────────────────────────────────────────────────────────
  vector:
    image: docker.io/timberio/vector:latest-alpine
    volumes:
      - ./config/vector/vector.toml:/etc/vector/vector.toml:ro
      - logs:/logs
    entrypoint: ["/bin/sh", "-c", "mkdir -p /logs/vector && exec /usr/local/bin/vector --config /etc/vector/vector.toml"]
    depends_on:
      - zeek
      - suricata
    restart: unless-stopped

  # ── pcap_ring_writer ──────────────────────────────────────────────────────
  pcap_ring_writer:
    build:
      context: ../../sensor-agent
      dockerfile: pcap-ring-writer.Containerfile
    network_mode: host
    cap_add:
      - NET_RAW
    cap_drop:
      - ALL
    environment:
      - CAPTURE_IFACE=${CAPTURE_IFACE:-eth0}
      - RING_SIZE_MB=${RING_SIZE_MB:-512}
      - RING_PATH=/dev/shm/sensor_pcap_ring
      - CONTROL_SOCK=/var/run/pcap_ring.sock
      - SENSOR_SVC_UID=0
    volumes:
      - /dev/shm:/dev/shm
      - /var/run:/var/run
    restart: unless-stopped

  # ── pcap_carve_simulator ──────────────────────────────────────────────────
  pcap_carve_simulator:
    build:
      context: ./pcap-carve-simulator
      dockerfile: Dockerfile
    environment:
      - ALERT_DELAY_SECONDS=${ALERT_DELAY_SECONDS:-10}
      - PRE_ALERT_WINDOW_SECONDS=${PRE_ALERT_WINDOW_SECONDS:-5}
      - POST_ALERT_WINDOW_SECONDS=${POST_ALERT_WINDOW_SECONDS:-3}
      - CONTROL_SOCK=/var/run/pcap_ring.sock
    volumes:
      - /var/run:/var/run
      - /tmp:/tmp
    depends_on:
      - pcap_ring_writer
    restart: "no"
